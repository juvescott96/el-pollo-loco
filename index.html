<!DOCTYPE html>
<html translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/img/favicon.png">
    <link rel="stylesheet" href="style.css">
    <title>El pollo loco</title>
    <script src="models/drawable-object.class.js"></script>
    <script src="models/collidable-object.class.js"></script>
    <script src="models/animated-object.class.js"></script>
    <script src="models/moveable-objects.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/small-chicken.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/clouds.class.js"></script>
    <script src="models/background-objects.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/status-bar-coin.class.js"></script>
    <script src="models/status-bar-bottle.class.js"></script>
    <script src="models/status-bar-endboss.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/levels.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/coins.class.js"></script>
    <script src="models/bottle.class.js"></script>
    <script src="models/audio.class.js"></script>
    <script src="level/level1.js"></script>
    <script src="js/game.js"></script>
</head>

<body onload="init()">
    <div class="rotate-device">
        <p>Turn your device to play</p>
    </div>
    <h1>El pollo loco</h1>

    <div class="game-container" id="fullscreen">
        <img id="startScreen" class="startscreen" onclick="togglePlay()"
            src="img/9_intro_outro_screens/start/startscreen_1.png" alt="Start Screen">
        <canvas width="720" height="480"></canvas>

        <div class="ui-buttons">
            <button class="btn" onclick="togglePlay()">
                <img id="playIcon" src="/img/icon/play.png" alt="play">
            </button>
            <button class="btn" onclick="toggleVolume()">
                <img id="volumeIcon" src="/img/icon/volume_on.png" alt="volume on">
            </button>
            <button class="btn" onclick="toggleFullscreen()">
                <img id="fullscreenIcon" src="/img/icon/fullscreen.png" alt="fullscreen">
            </button>
        </div>

        <div class="control-buttons">
            <div class="left-controls">
                <button class="btn" id="btnLeft">
                    <img src="/img/icon/arrow_left.png" alt="left" dragable="false">
                </button>
                <button class="btn" id="btnRight">
                    <img src="/img/icon/arrow_right.png" alt="right" dragable="false">
                </button>
            </div>

            <div class="right-controls">
                <button class="btn" id="jumpBtn">
                    <img src="/img/icon/arrow_up.png" alt="up" dragable="false">
                </button>
                <button class="btn" id="throwBtn">
                    <img src="/img/icon/bottle.png" alt="bottle" dragable="false">
                </button>
            </div>
        </div>

        <div id="gameOverScreen" class="overlay d_none">
            <img class="overlay-img" src="img/You won, you lost/You lost b.png" alt="You lost">
            <button class="btn replay-btn" onclick="restartGame()">
                <img src="/img/icon/replay.png" alt="replay">
            </button>
        </div>

        <div id="gameWinScreen" class="overlay d_none">
            <img class="overlay-img" src="img/You won, you lost/You Win A.png" alt="You won">
            <button class="btn replay-btn" onclick="restartGame()">
                <img src="/img/icon/replay.png" alt="replay">
            </button>
        </div>
    </div>

</body>

</html>
